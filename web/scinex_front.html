/* Runtime state. job.status drives the whole UI: idle|ready|running|succeeded|error */

const stages=[
 ["uploaded","PDF принят","Входной документ зарегистрирован"],

/* ---------- helpers ---------- */
function ico(n){return `<svg class="ico"><use href="#i-${n}"/></svg>`}
function esc(x){return String(x??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function toast(m,kind){const el=document.getElementById("toast");toastText.textContent=m;toastIcon.innerHTML=`<use href="#i-${kind==="err"?"alert":"check"}"/>`;el.className="toast open"+(kind==="err"?" err":"");clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove("open"),2600)}
function bytes(b){if(!b)return"0 B";const u=["B","KB","MB","GB"],i=Math.min(Math.floor(Math.log(b)/Math.log(1024)),u.length-1);return`${(b/Math.pow(1024,i)).toFixed(i?1:0)} ${u[i]}`}

const MOD={image:{l:"изображение",s:"изобр.",c:"var(--cyan)"},table:{l:"таблица",s:"таблица",c:"var(--emerald)"},text:{l:"текст",s:"текст",c:"var(--indigo)"}};
function rowName(r){return r.compound_id||r.complex_id||r.compound||r.id||r.nanomaterial||r.nanoparticle||"row"}
/* ----- universal cell model (backend-ready) -----
   row = { id, label, page, cells:{ key: Cell } }
   Cell = { key, value, raw, dtype, unit, confidence, provenance:[ {doc_id,page,modality,locator,snippet,extractor} ] }
   Rendering dispatches on cell.dtype (value) and locator.kind (evidence) — never on field name. */
const QTY=new Set(["mic","pmic","km","vmax","ph","temperature","size_nm","magnetization","solubility","photostability","viability","concentration","fic_index","stability_constant","exposure_time"]);
const IDF=new Set(["compound_id","complex_id","id"]);
const ENUMF=new Set(["effect","method","assay"]);
function dtypeOf(k){return k==="smiles"?"smiles":QTY.has(k)?"quantity":IDF.has(k)?"id":ENUMF.has(k)?"enum":"string"}
function clamp(a,x,b){return Math.max(a,Math.min(b,x))}
function hashStr(s){let h=0;s=String(s);for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h)}
function parseQty(raw){const m=String(raw).match(/^\s*([<>~]?\s*-?\d[\d.,]*(?:e[+-]?\d+)?)\s*(.*)$/i);if(!m)return{value:raw,unit:""};const num=parseFloat(m[1].replace(/\s+/g,"").replace(",","."));return isNaN(num)?{value:raw,unit:""}:{value:num,unit:m[2].trim()}}
const JRNL=["acs","rsc","ejmc","jmc","nano","chem"];
function mkDoc(seed,page){const j=JRNL[hashStr(seed)%JRNL.length];const y=2018+(hashStr(seed+"y")%7);return{doc_id:j+"-"+y+"-p"+page,title:j.toUpperCase()+" "+y}}
const DOCPAL=["#22d3ee","#34d399","#fbbf24","#c084fc","#818cf8","#fb7185"];
function docColor(id){return DOCPAL[hashStr(id)%DOCPAL.length]}
function docBadge(id){return`<span class="docb" title="документ ${esc(id)}"><span class="dch" style="background:${docColor(id)}"></span>${esc(id)}</span>`}
/* build one Cell with synthetic provenance — replaced by backend cells later */
function makeCell(key,raw,c){
 const dt=dtypeOf(key),q=dt==="quantity"?parseQty(raw):null;
 const value=q?q.value:raw,unit=q?q.unit:"",lbl=c.rowLabel,pg=c.page,fpg=c.figPage;
 const tableCell=(doc,ex)=>({doc_id:doc.doc_id,page:pg,modality:"table",locator:{kind:"table_cell",row:lbl,col:key},snippet:ex||"table-parser",extractor:ex||"table-parser"});
 const charSpan=doc=>({doc_id:doc.doc_id,page:pg,modality:"text",locator:{kind:"char_span",start:140,end:140+String(raw).length},snippet:"ie-llm",extractor:"ie-llm"});
 const figLabel=doc=>({doc_id:doc.doc_id,page:fpg,modality:"image",locator:{kind:"figure_label",label:lbl},snippet:"molscribe",extractor:"molscribe"});
 const bbox=doc=>({doc_id:doc.doc_id,page:fpg,modality:"image",locator:{kind:"bbox",box:[64,210,300,360]},snippet:"vlm",extractor:"vlm"});
 let prov;
 if(dt==="smiles")prov=[figLabel(c.figureDoc)];
 else if(key==="size_nm")prov=[bbox(c.figureDoc)];
 else if(dt==="string")prov=[charSpan(c.primaryDoc)];
 else prov=[tableCell(c.primaryDoc)];
 if(key===c.headlineKey){
  if(c.rowIndex===1)prov=[charSpan(c.primaryDoc),tableCell(c.secondaryDoc,"table-parser")];
  else prov=[...prov,tableCell(c.secondaryDoc,"table-parser")];
 }
 return{key,value,raw,dtype:dt,unit,confidence:c.conf,provenance:prov};
}
function buildRow(domain,flat,idx){
 const fields=(schemas[domain]||[]).filter(f=>f!=="source_page");
 const lbl=flat.compound_id||flat.complex_id||flat.compound||flat.id||flat.nanomaterial||flat.nanoparticle||"row";
 const page=flat.source_page||1;
 const docs={primaryDoc:mkDoc(domain+lbl,page),secondaryDoc:mkDoc(domain+lbl+"b",page),figureDoc:mkDoc(domain+"fig",page)};
 const headlineKey=fields.find(f=>dtypeOf(f)==="quantity")||null,cells={};
 fields.forEach((ff,i)=>{
  const raw=flat[ff]??flat[ff.replace("_id","")]??"";

/* backend seam: read a cell; tolerate partial/flat backend rows */
function getCell(row,key){

 const raw=c.raw??c.value??(row[key]??"");
 return{key,value:c.value??raw,raw,dtype:c.dtype||dtypeOf(key),unit:c.unit||"",confidence:typeof c.confidence==="number"?c.confidence:.85,provenance:Array.isArray(c.provenance)?c.provenance:[]};

function rowFields(){return(schemas[state.domain]||schemas.Benzimidazoles).filter(f=>f!=="source_page")}

/* value render — dispatch on dtype */
function renderValue(c,compact){

}

}
function renderLocator(p){const L=p.locator||{},k=L.kind;
 if(k==="table_cell")return`<table class="evmini"><tr><td class="hl">${esc(L.row)}</td><td>${esc(L.col)}</td></tr></table>`;
 if(k==="char_span")return`<div class="evtext">…<span class="hl">${esc(L.row||"")}значение в абзаце</span>…</div>`;
 if(k==="bbox")return`<svg class="pmini" viewBox="0 0 120 150"><rect x="6" y="6" width="108" height="138" rx="7" fill="none" stroke="var(--line)"/><rect x="16" y="18" width="88" height="5" rx="2" fill="rgba(148,163,184,.3)"/><rect x="16" y="30" width="70" height="5" rx="2" fill="rgba(148,163,184,.25)"/><rect class="bx" x="24" y="64" width="72" height="46" rx="5"/></svg>`;

}
function modBadge(m){const o=MOD[m]||MOD.text;return`<span class="modb" style="--m:${o.c}">${o.s}</span>`}

function modLegend(){return`<div class="modlegend">${["image","table","text"].map(modBadge).join("")}</div>`}

function toCsv(rows){return rows.map(r=>r.map(csvEsc).join(",")).join("\n")}

 ];
 const empty=!state.rows.length;
 return `<div class="screen">${empty?`<section class="card" style="margin-bottom:18px"><div class="banner"><div class="bdot" style="color:var(--amber);background:rgba(245,158,11,.12)">${ico("alert")}</div><div><h3>Пока нечего экспортировать</h3><p>Сначала запустите извлечение — экспорт ниже соберёт текущие строки, источники и метрики.</p></div></div></section>`:""}
  <div class="exports">${items.map(([k,t,ds])=>`<section class="exportcard"><h3>${ico(k==="csv"?"csv":k==="json"?"json":k==="molecule"?"molecule":k==="metrics"?"metrics":k==="job"?"job":"source")}${t}</h3><p>${ds}</p><button class="btn primary exportbtn" data-export="${k}"${empty?" disabled style=\"opacity:.5;cursor:not-allowed\"":""}>${ico("export")}Скачать</button></section>`).join("")}</div></div>`;
}

/* ---------- view: contract ---------- */
function contract(){
 const payload={
  endpoint:backendInput.value||"api/chemx/extract",
  method:"POST",
  request:{file:"multipart PDF",domain:state.domain,options:{render_structures:true,return_evidence:true,return_page_previews:true,normalize_units:true,validate_smiles:true}},
  response_shape:{
   extraction_id:"ext_001",domain:state.domain,
   documents:[{doc_id:"acs-2021-p5",title:"ACS 2021"}],
   rows:[{
    id:"L2",
    cells:{
     "<field>":{
      value:"каноническое значение",raw:"как в источнике",dtype:"smiles | quantity | enum | string | id | list",unit:"µg/mL",confidence:0.0,
      provenance:[{doc_id:"acs-2021-p5",page:5,modality:"image | table | text",locator:{kind:"table_cell | char_span | bbox | figure_label","…":"поля локатора"},snippet:"…",extractor:"table-parser | ie-llm | molscribe | vlm"}]
     }
    }
   }],
   metrics:"optional"
  }
 };
 return `<div class="screen"><section class="card"><div class="head"><div><h2>${ico("job")}Контракт бэкенда</h2><p>Один endpoint. Каждая ячейка самоописательна: dtype для значения, provenance[] с locator.kind для доказательства. provenance — список, поэтому ячейка может прийти из нескольких документов (консенсус).</p></div><span class="chip mock">справочно</span></div><div class="pad"><pre>${esc(JSON.stringify(payload,null,2))}</pre></div></section></div>`;
}

/* ---------- events ---------- */
function bind(){
 const $=id=>document.getElementById(id);
 const choose=$("choose"),pdf=$("pdf"),upload=$("upload"),runPanel=$("runPanel");
 if(choose&&pdf)choose.onclick=()=>pdf.click();
 if(runPanel)runPanel.onclick=runExtraction;
 if(pdf)pdf.onchange=e=>handleFile(e.target.files[0]);
 if(upload){upload.ondragover=e=>{e.preventDefault();upload.classList.add("drag")};upload.ondragleave=()=>upload.classList.remove("drag");upload.ondrop=e=>{e.preventDefault();upload.classList.remove("drag");handleFile(e.dataTransfer.files[0])}}
 const simErr=$("simErr");if(simErr)simErr.onclick=simulateError;
 const retry=$("retry");if(retry)retry.onclick=runExtraction;
 const resetErr=$("resetErr");if(resetErr)resetErr.onclick=resetSession;
 document.querySelectorAll(".domain").forEach(c=>c.onclick=()=>{state.domain=c.dataset.domain;domainSelect.value=state.domain;clearResults();render()});
 document.querySelectorAll(".ev").forEach(b=>b.onclick=()=>{state.source=Number(b.dataset.ev);state.view="source";render()});
 document.querySelectorAll(".sourceitem").forEach(b=>{if(b.dataset.src!==undefined)b.onclick=()=>{state.source=Number(b.dataset.src);render()}});
 const copy=$("copyCsv");if(copy)copy.onclick=async()=>{try{await navigator.clipboard.writeText(buildCsv());toast("CSV скопирован")}catch{toast("Буфер недоступен — нажмите «Скачать CSV»","err")}};
 const exp=$("exportCsv");if(exp)exp.onclick=()=>exportByType("csv");
 const rr=$("rerender");if(rr)rr.onclick=()=>toast("Структуры перерисованы");
 document.querySelectorAll(".exportbtn").forEach(b=>{if(!b.disabled)b.onclick=()=>exportByType(b.dataset.export)});
}

function clearResults(){state.rows=[];state.metrics=null;state.source=0;if(state.job.status!=="running")state.job={status:state.file?"ready":"idle",stage:state.file?0:-1,percent:state.file?10:0,msg:state.file?"PDF selected":"Waiting for PDF"}}
function resetSession(){state.file=null;clearResults();state.job={status:"idle",stage:-1,percent:0,msg:"Waiting for PDF"};state.view="extract";toast("Сессия сброшена");render()}
function handleFile(f){if(!f)return;state.file=f;state.job={status:"ready",stage:0,percent:10,msg:"PDF selected"};toast("PDF загружен");render()}

function simulateError(){
 state.rows=[];state.metrics=null;
 state.job={status:"error",stage:1,percent:46,msg:DEMO_ERROR};
 state.view="extract";
 toast("Сбой извлечения (демо)","err");
 render();
}

async function runExtraction(){
 state.job={status:"running",stage:0,percent:5,msg:"Submitting extraction job"};
 state.view="extract";
 render();
 for(let i=0;i<stages.length;i++){
  state.job.stage=i;
  state.job.percent=Math.min(98,8+i*18);
  state.job.msg=stages[i][2];
  render();
  await new Promise(r=>setTimeout(r,330));
 }
 try{
  const fd=new FormData();
  if(state.file)fd.append("file",state.file);
  fd.append("domain",state.domain);
  fd.append("options",JSON.stringify({render_structures:true,return_evidence:true,normalize_units:true,validate_smiles:true}));
  const ep=(backendInput.value||"api/chemx/extract").trim();
  const resp=await fetch(ep,{method:"POST",body:fd});
  if(!resp.ok)throw new Error("HTTP "+resp.status+" "+(await resp.text()).slice(0,160));
  const data=await resp.json();
  state.rows=Array.isArray(data.rows)?data.rows:[];
  state.metrics=data.metrics||null;
  state.extraction=data;
  state.job={status:"succeeded",stage:stages.length,percent:100,msg:data.stats?(data.stats.rows+" строк · структур "+data.stats.with_structure):"Done"};
  state.source=0;
  state.view="results";
  toast("Извлечение завершено · "+state.rows.length+" строк");
  render();
 }catch(e){
  state.rows=[];state.metrics=null;
  state.job={status:"error",stage:1,percent:46,msg:String((e&&e.message)||e)};
  state.view="extract";
  toast("Сбой извлечения","err");
  render();
 }
}

/* ---------- export ---------- */
function buildCsv(){const fs=rowFields(),h=[...fs,"row_confidence"];return toCsv([h,...state.rows.map(r=>[...fs.map(f=>getCell(r,f).raw),avgConf(r).toFixed(3)])])}
function exportByType(t){
 if(!state.rows.length){toast("Сначала запустите извлечение","err");return}
 const base=`scinex_${state.domain.toLowerCase()}_${new Date().toISOString().slice(0,10)}`,fs=rowFields();
 if(t==="csv")return download(`${base}.csv`,buildCsv(),"text/csv;charset=utf-8");
 if(t==="json")return download(`${base}.json`,JSON.stringify({domain:state.domain,rows:state.rows},null,2),"application/json;charset=utf-8");
 if(t==="source")return download(`${base}_provenance.json`,JSON.stringify(state.rows.map(r=>({id:r.id,cells:Object.fromEntries(fs.map(f=>{const c=getCell(r,f);return[f,{dtype:c.dtype,value:c.value,unit:c.unit,confidence:c.confidence,provenance:c.provenance}]}))})),null,2),"application/json;charset=utf-8");
 if(t==="molecule")return download(`${base}_render_manifest.json`,JSON.stringify(state.rows.map(r=>{const sc=getCell(r,"smiles");return{id:r.id,smiles:sc.raw||null,render:sc.raw?"backend_svg_expected":"nano_card"}}),null,2),"application/json;charset=utf-8");
 if(t==="metrics")return download(`${base}_metrics.json`,JSON.stringify({domain:state.domain,baseline:d().baseline,metrics:state.metrics,_note:"synthetic demo metrics — replace with backend output"},null,2),"application/json;charset=utf-8");
 if(t==="job")return download(`${base}_manifest.json`,JSON.stringify({app:"SCINEX",version:"1.5",mode:"demo",endpoint:backendInput.value,file:state.file?{name:state.file.name,size:state.file.size,type:state.file.type}:null,domain:state.domain,job:state.job},null,2),"application/json;charset=utf-8");
}

/* ---------- init ---------- */
domainSelect.innerHTML=domains.map(x=>`<option value="${esc(x.key)}">${esc(x.key)} · ${trackRu(x.track)}</option>`).join("");
domainSelect.value=state.domain;
domainSelect.onchange=e=>{state.domain=e.target.value;clearResults();render()};
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render()});
runBtn.onclick=runExtraction;
themeBtn.onclick=()=>{state.dark=!state.dark;document.body.classList.toggle("dark",state.dark);themeBtn.innerHTML=state.dark?ico("sun"):ico("moon")};
resetBtn.onclick=resetSession;
render();
</script>
</body>
</html>
